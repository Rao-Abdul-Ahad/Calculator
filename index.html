<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <center>
        <div>
            <h1>Calculator</h1>
        </div>
        <div>
            <input  class="inp" type="text" name="" id="inp">
        </div>
        <br>
        <div>
            <div>
                <button class="clra" onclick="clra()">Clear All</button>
                <button class="clr" onclick="clr()">Clear</button>

            </div>
            <br>
            <div>
                <button  class="btn" onclick="dabaya(9)">9</button>
                <button  class="btn" onclick="dabaya(8)">8</button>
                <button  class="btn" onclick="dabaya(7)">7</button>
                <button  class="btn" onclick="dabaya('+')">+</button>
            </div>
            <div>
                <button  class="btn" onclick="dabaya(6)">6</button>
                <button  class="btn" onclick="dabaya(5)">5</button>
                <button  class="btn" onclick="dabaya(4)">4</button>
                <button  class="btn" onclick="dabaya('-')">-</button>
            </div>
            <div>
                <button  class="btn" onclick="dabaya(3)">3</button>
                <button  class="btn" onclick="dabaya(2)">2</button>
                <button  class="btn" onclick="dabaya(1)">1</button>
                <button  class="btn" onclick="dabaya('/')">/</button>
            </div>
            <div>
                <button  class="btn" onclick="dabaya('*')">*</button>
                <button  class="btn" onclick="dabaya('%')">%</button>
                <button  class="btn" onclick="dabaya(0)">0</button>
                <button  class="btn" onclick="sol()">=</button>
            </div>
        </div>
    </center>


    <script src="app.js"></script>
</body>

</html>
